{% extends "base.html" %}

{% block title %}About | {{ config.siteName }}{% endblock %}

{% block content %}
<section class="about-section">
  <div class="about-header">
    {% if theme_config.avatar %}
    <img class="about-avatar" src="{{ theme_config.avatar }}" alt="{{ config.siteName }}">
    {% endif %}
    <h1 class="about-name">{{ config.siteName }}</h1>
  </div>

  <div class="about-content post-content">
    {{ post.content }}
  </div>
</section>
{% endblock %}
