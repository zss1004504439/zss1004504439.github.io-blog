{% extends "base.html" %}

{% block title %}Archive | {{ config.siteName }}{% endblock %}

{% block content %}
<section class="archive-section">
  <div class="page-header">
    <h1 class="page-title">Archive</h1>
    <p class="page-description">{{ posts|length }} posts in total</p>
  </div>

  <div class="archive-list">
    {% for post in posts %}
    <a href="{{ post.link }}" class="archive-item">
      <div class="archive-item-main">
        <h3 class="archive-item-title">{{ post.title }}</h3>
      </div>
      <time class="archive-item-date">{{ post.dateFormat }}</time>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
