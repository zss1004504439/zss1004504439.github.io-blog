{% extends "base.html" %}

{% block title %}#{{ current_tag.name }} | {{ config.siteName }}{% endblock %}

{% block content %}
<section class="tag-section">
  <div class="page-header">
    <h1 class="page-title"># {{ current_tag.name }}</h1>
    <p class="page-description">{{ posts|length }} posts tagged</p>
  </div>

  <div class="post-list">
    {% for post in posts %}
    {% include "partials/post-card.html" %}
    {% endfor %}
  </div>
</section>
{% endblock %}
