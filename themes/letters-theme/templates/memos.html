{% extends "base.html" %}

{% block title %}Memos | {{ config.siteName }}{% endblock %}

{% block content %}
<section class="memos-section">
  <div class="page-header">
    <h1 class="page-title">Memos</h1>
    <p class="page-description">Fleeting thoughts and quick notes</p>
  </div>

  <div class="memos-timeline">
    {% for memo in memos %}
    <article class="memo-item">
      <div class="memo-meta">
        <time class="memo-date">{{ memo.dateFormat }}</time>
      </div>
      <div class="memo-content">
        {{ memo.content }}
      </div>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
