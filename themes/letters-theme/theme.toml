# Letters — 极简 Newsletter 风格博客主题
# 灵感来自 letters.thedankoe.com

[theme]
name = "Letters"
version = "1.0.0"
description = "极简 Newsletter 风格博客主题，专注阅读体验"
author = "Gridea Pro"
license = "MIT"
engine = "jinja2"
min_gridea_version = "1.0.0"
preview = "screenshot.png"

# ============================================================
# 主题可配置项
# Gridea Pro 会根据以下声明自动生成 GUI 设置面板
# ============================================================

# --- 基础设置 ---

[config.subtitle]
type = "text"
label = "副标题"
default = "写给自己和世界的信"

[config.bio]
type = "textarea"
label = "个人简介"
default = "在这里写下你的个人简介，它会显示在首页头部和关于页面。"

[config.avatar]
type = "image"
label = "头像"
default = ""

# --- 外观设置 ---

[config.primaryColor]
type = "color"
label = "主色调"
default = "#222222"

[config.accentColor]
type = "color"
label = "强调色"
default = "#D97706"

[config.fontFamily]
type = "select"
label = "正文字体"
default = "system"
options = ["system", "serif", "sans-serif", "Georgia", "Noto Serif SC"]

[config.maxWidth]
type = "select"
label = "内容区域宽度"
default = "720px"
options = ["640px", "720px", "800px"]

[config.showHeroImage]
type = "boolean"
label = "首页显示头图"
default = false

[config.heroImage]
type = "image"
label = "首页头图"
default = ""

# --- 功能开关 ---

[config.postsPerPage]
type = "number"
label = "每页文章数"
default = 10
min = 5
max = 30

[config.showSearch]
type = "boolean"
label = "显示搜索功能"
default = true

[config.showToc]
type = "boolean"
label = "文章页显示目录"
default = true

[config.showReadingTime]
type = "boolean"
label = "显示阅读时长"
default = true

[config.showTags]
type = "boolean"
label = "文章页显示标签"
default = true

[config.showNextPrev]
type = "boolean"
label = "文章页显示上下篇"
default = true

[config.showMemos]
type = "boolean"
label = "导航栏显示闪念入口"
default = true

[config.showLinks]
type = "boolean"
label = "导航栏显示友链入口"
default = true

# --- 社交链接 ---

[config.socialGithub]
type = "text"
label = "GitHub"
default = ""

[config.socialTwitter]
type = "text"
label = "Twitter / X"
default = ""

[config.socialEmail]
type = "text"
label = "邮箱"
default = ""

[config.socialRSS]
type = "boolean"
label = "显示 RSS 订阅"
default = true

# --- 自定义代码 ---

[config.customCSS]
type = "code"
label = "自定义 CSS"
language = "css"
default = ""

[config.customHeader]
type = "code"
label = "自定义 Header 代码"
language = "html"
default = ""

[config.customFooter]
type = "code"
label = "自定义 Footer 代码"
language = "html"
default = ""
