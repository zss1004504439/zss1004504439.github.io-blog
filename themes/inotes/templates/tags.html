<html>

<head>
    {{template "head" .}}
    <meta name="description" content="{{or .Site.CustomConfig.metaDescription .ThemeConfig.SiteDescription}}" />
</head>

<body>
    <div class="main">
        <div class="main-content">
            {{template "header" .}}

            <div class="tags-container">
                {{range .Tags}}
                <a class="tag" href="{{.Link}}">{{.Name}}</a>
                {{end}}
            </div>

            {{template "footer" .}}
        </div>
    </div>
</body>

</html>
