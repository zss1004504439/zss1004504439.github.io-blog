{% extends "base.html" %}
{% block title %}闪念 | {{ config.siteName }}{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h1 class="page-title">闪念</h1>
    <p class="page-subtitle">灵感碎片与随想</p>
  </div>

  {% if memos|length > 0 %}
  <div class="memo-timeline">
    {% for memo in memos %}
    <div class="memo-item">
      <div class="memo-item__marker"></div>
      <div class="memo-item__card">
        <div class="memo-item__content article-content">
          {{ memo.content|safe }}
        </div>
        <time class="memo-item__date meta-text">{{ memo.date }}</time>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty-state">
    <p class="empty-state__text">暂无闪念</p>
    <p class="empty-state__hint meta-text">灵感尚未降临……</p>
  </div>
  {% endif %}
</div>
{% endblock %}
