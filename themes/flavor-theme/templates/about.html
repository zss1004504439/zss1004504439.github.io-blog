{% extends "base.html" %}
{% block title %}{{ post.title }} | {{ config.siteName }}{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h1 class="page-title">{{ post.title }}</h1>
    <p class="page-subtitle meta-text">{{ config.siteDescription }}</p>
  </div>

  <div class="article-content">
    {{ post.content|safe }}
  </div>
</div>
{% endblock %}
