<section class="comment-section">
  <h2 class="comment-section__title">评论</h2>
  <div id="cusdis_thread"
    data-host="{{ commentSetting.host }}"
    data-app-id="{{ commentSetting.appId }}"
    data-page-id="{{ post.fileName }}"
    data-page-url="{{ post.link }}"
    data-page-title="{{ post.title }}"
    data-theme="dark">
  </div>
  <script async defer src="{{ commentSetting.host }}/js/cusdis.es.js"></script>
</section>
