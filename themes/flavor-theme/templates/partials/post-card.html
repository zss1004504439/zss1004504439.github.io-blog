<article class="post-card post-card--list">
  <div class="post-card__body">
    <a href="{{ post.link }}" class="post-card__title-link">
      <h3 class="post-card__title clamp-3">{{ post.title }}</h3>
    </a>
    <a href="{{ post.link }}" class="post-card__excerpt clamp-2">
      {{ post.content|striptags|truncatechars:120 }}
    </a>
    <div class="post-card__meta meta-text">
      {{ post.dateFormat }}
      {% if post.isTop %}<span class="badge badge--top">置顶</span>{% endif %}
    </div>
  </div>
  {% if post.feature %}
  <a href="{{ post.link }}" class="post-card__thumb-link">
    <img class="post-card__thumb" src="{{ post.feature }}" alt="{{ post.title }}" loading="lazy" />
  </a>
  {% endif %}
</article>
