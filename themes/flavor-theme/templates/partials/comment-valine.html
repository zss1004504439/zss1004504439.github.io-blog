<section class="comment-section">
  <h2 class="comment-section__title">评论</h2>
  <div id="vcomments"></div>
  <link rel="stylesheet" href="https://unpkg.com/valine@1/dist/Valine.min.css">
  <script src="https://unpkg.com/valine@1/dist/Valine.min.js"></script>
  <script>
    new Valine({
      el: '#vcomments',
      appId: '{{ commentSetting.appId }}',
      appKey: '{{ commentSetting.appKey }}',
      serverURLs: '{{ commentSetting.serverURLs }}',
      avatar: 'mp',
      placeholder: '说点什么吧…'
    });
    // Valine 内置 locale 不支持覆盖，手动替换 placeholder
    var linkInput = document.querySelector('#vcomments .vlink');
    if (linkInput) linkInput.placeholder = '网址(https://)';
  </script>
</section>
